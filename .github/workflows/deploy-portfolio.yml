name: Deploy portfolio to dist branch

on:
  push:
    branches:
      - main
    paths:
      - 'artifacts/portfolio/**'
      - 'packages/**'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-portfolio.yml'
  workflow_dispatch: {}

concurrency:
  group: deploy-portfolio
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build portfolio
        env:
          PORT: '5173'
          BASE_PATH: '/'
          NODE_ENV: 'production'
        run: pnpm --filter @workspace/portfolio run build

      - name: Publish dist/public to dist branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          BUILD_DIR="artifacts/portfolio/dist/public"
          if [ ! -d "$BUILD_DIR" ]; then
            echo "Build output not found at $BUILD_DIR" >&2
            exit 1
          fi

          SRC_COMMIT="$(git rev-parse --short HEAD)"
          SRC_MESSAGE="$(git log -1 --pretty=%s)"

          PUBLISH_DIR="$(mktemp -d)"
          cp -R "$BUILD_DIR"/. "$PUBLISH_DIR"/
          touch "$PUBLISH_DIR/.nojekyll"

          cd "$PUBLISH_DIR"
          git init -q
          git checkout -q -b dist
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy ${SRC_COMMIT}: ${SRC_MESSAGE}"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push -f origin dist
