name: Deploy portfolio to dist branch

on:
  push:
    branches:
      - main
    paths:
      - 'artifacts/portfolio/**'
      - 'packages/**'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-portfolio.yml'
  workflow_dispatch: {}

concurrency:
  group: deploy-portfolio
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build portfolio
        env:
          PORT: '5173'
          BASE_PATH: '/'
          NODE_ENV: 'production'
        run: pnpm --filter @workspace/portfolio run build

      - name: Publish dist/public to dist branch (linear history)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          BUILD_DIR="artifacts/portfolio/dist/public"
          if [ ! -d "$BUILD_DIR" ]; then
            echo "Build output not found at $BUILD_DIR" >&2
            exit 1
          fi

          SRC_COMMIT="$(git rev-parse --short HEAD)"
          SRC_MESSAGE="$(git log -1 --pretty=%s)"

          # Stash the build output outside the working tree so we can switch branches.
          PUBLISH_DIR="$(mktemp -d)"
          cp -R "$BUILD_DIR"/. "$PUBLISH_DIR"/
          touch "$PUBLISH_DIR/.nojekyll"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Try to fetch the existing dist branch so we can extend its history.
          git fetch origin dist:refs/remotes/origin/dist 2>/dev/null || true

          if git show-ref --verify --quiet refs/remotes/origin/dist; then
            echo "Extending existing dist branch (no force push)."
            git checkout -B dist refs/remotes/origin/dist
          else
            echo "Creating dist branch for the first time."
            git checkout --orphan dist
          fi

          # Replace the working tree with only the new build output.
          git rm -rf --quiet . 2>/dev/null || true
          # `git rm` doesn't always remove untracked files in odd cases; clean explicitly too.
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +

          cp -R "$PUBLISH_DIR"/. .

          git add -A

          if git diff --cached --quiet; then
            echo "No changes in built output — nothing to deploy."
            exit 0
          fi

          git commit -q -m "Deploy ${SRC_COMMIT}: ${SRC_MESSAGE}"
          git push origin dist
