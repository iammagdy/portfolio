name: Build & Update dist branch

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build portfolio
        run: pnpm --filter @workspace/portfolio run build
        env:
          PORT: "3000"
          BASE_PATH: "/"
          NODE_ENV: production

      - name: Add .htaccess for SPA routing
        run: |
          cat > artifacts/portfolio/dist/public/.htaccess << 'EOF'
          Options -MultiViews
          RewriteEngine On
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteRule ^ index.html [QSA,L]
          EOF

      - name: Push built files to dist branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./artifacts/portfolio/dist/public
          publish_branch: dist
          force_orphan: true
          commit_message: "Build from ${{ github.sha }}"
